name: collab_notes
description: Collaborative Notes MVP
publish_to: 'none'
version: 1.15.0+18

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # HTTP
  dio: ^5.7.0

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2

  # Image
  image_picker: ^1.1.2
  image_cropper: ^8.0.2
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.9
  solar_icons: ^0.1.0

  # Realtime and notifications
  web_socket_channel: ^3.0.1
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5
  flutter_local_notifications: ^17.2.3

  # Animations
  confetti: ^0.8.0
  flutter_animate: ^4.5.2
  loading_animation_widget: ^1.3.0

  # Utils
  package_info_plus: ^8.0.2
  url_launcher: ^6.3.0
  path_provider: ^2.1.4
  intl: ^0.19.0
  open_filex: ^4.7.0
  local_notifier: ^0.1.6
  flutter_staggered_grid_view: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.3
  build_runner: ^2.4.12
  custom_lint: ^0.7.6
  riverpod_lint: ^2.3.13
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.5

flutter_launcher_icons:
  android: true
  ios: true
  windows:
    generate: true
    icon_size: 256
    image_path: "assets/icon/app_icon.png"
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#161616"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter_native_splash:
  color: "#161616"
  image: "assets/icon/app_icon_splash.png"
  color_dark: "#161616"
  image_dark: "assets/icon/app_icon_splash.png"
  android_12:
    color: "#161616"
    icon_background_color: "#161616"
    image: "assets/icon/app_icon_splash.png"
    color_dark: "#161616"
    icon_background_color_dark: "#161616"
    image_dark: "assets/icon/app_icon_splash.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
